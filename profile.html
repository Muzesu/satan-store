<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Center | SATAN STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 會員中心卡片 - 延續毛玻璃金屬質感 */
        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 50px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* 大頭貼圖示 */
        .profile-avatar {
            font-size: 80px;
            margin-bottom: 20px;
            color: #ffffff;
            /* 複刻你要求的靜態微光 */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
        }

        /* 會員名稱 - 靜態微光 */
        h1 {
            font-size: 24px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        /* 個人資訊清單 */
        .info-group {
            text-align: left;
            margin-bottom: 40px;
        }

        .info-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .label { color: #888; text-transform: uppercase; }
        .value { color: #fff; font-weight: bold; }

        /* 按鈕 - 與首頁按鈕一致 */
        .action-btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 2px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
        }

        .action-btn:hover {
            background: #fff;
            color: #000;
        }

        .logout-link {
            color: #555;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .logout-link:hover { color: #ff4444; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="profile-avatar">
            <i class="fa-solid fa-circle-user"></i>
        </div>
        <h1>Member Profile</h1>

        <div class="info-group">
            <div class="info-item">
                <span class="label">Username</span>
                <span class="value">SATAN_USER_01</span>
            </div>
            <div class="info-item">
                <span class="label">Email</span>
                <span class="value">user@satanstore.com</span>
            </div>
            <div class="info-item">
                <span class="label">Membership</span>
                <span class="value">VIP BLACK</span>
            </div>
        </div>

        <a href="#" class="action-btn">Order History</a>
        <a href="#" class="action-btn">Edit Account</a>
        <a href="index.html" class="action-btn">BACK TO SHOP</a>
        
        <br>
        <a href="#" class="logout-link">LOGOUT</a>
    </div>

</body>
</html>
